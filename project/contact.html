<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="author" content="Luis Javier Pardo Castañeda">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta
      name="description"
      content="ISO LIBRE — Photographer and filmmaker based in Mexico City. Available for portrait, event, cinematic and studio projects in CDMX and worldwide.">
    <meta name="theme-color" content="#1B2631">
    <title>ISO LIBRE | Contact</title>
    <link rel="stylesheet" href="styles/portfolio.css">
  </head>
  <body>
    <!-- ============================================
       NAVBAR
  ============================================ -->
    <header class="navbar">
      <a href="index.html" class="navbar__logo">
        <img src="images/logo.png" alt="Colorful camera logo with a swirling rainbow lens and the text ISO LIBRE beneath it conveying energetic creative photography">
      </a>
      <nav class="navbar__links">
        <a href="index.html" class="navbar__link">Home</a>
        <a href="portfolio.html" class="navbar__link">Portfolio</a>
        <a href="contact.html" class="navbar__btn">Contact</a>
      </nav>
      <button
        class="navbar__hamburger"
        aria-label="Open menu"
        aria-expanded="false"
      >
        <span></span><span></span><span></span>
      </button>
    </header>

    <!-- Mobile nav -->
    <div class="mobile-nav" id="mobileNav">
      <a href="index.html" class="mobile-nav__link">Home</a>
      <a href="portfolio.html" class="mobile-nav__link">Portfolio</a>
      <a href="contact.html" class="mobile-nav__link">Contact</a>
    </div>

    <!-- ============================================
       MAIN
  ============================================ -->
    <main class="contact-page">
      <!-- LEFT — Info -->
      <div class="contact-info">
        <h1 class="contact-info__title">
          LET'S CREATE<br><span>YOUR VISION</span>
        </h1>
        <p class="contact-info__sub">
          Available for projects<br>in CDMX and worldwide
        </p>

        <ul class="contact-info__list">
          <li>
            <span class="contact-info__label">Instagram</span>
            <a
              href="https://instagram.com/iso.libre"
              target="_blank"
              rel="noopener noreferrer"
              class="contact-info__link"
            >
              @iso.libre
            </a>
          </li>
          <li>
            <span class="contact-info__label">WhatsApp</span>
            <a
              href="https://wa.me/521XXXXXXXXXX"
              target="_blank"
              rel="noopener noreferrer"
              class="contact-info__link"
            >
              +52 5560775812
            </a>
          </li>
          <li>
            <span class="contact-info__label">Email</span>
            <a href="mailto:tu@email.com" class="contact-info__link">
              ISO.LIBRE@gmail.com
            </a>
          </li>
        </ul>
      </div>

      <!-- RIGHT — Form -->
    <form class="contact-form" method="get" action="review.html">
        <div class="contact-form__field">
          <label class="contact-form__label" for="name">NAME</label>
          <input
            class="contact-form__input"
            type="text"
            id="name"
            placeholder="Your name"
          >
        </div>

        <div class="contact-form__field">
          <label class="contact-form__label" for="email">EMAIL</label>
          <input
            class="contact-form__input"
            type="email"
            id="email"
            placeholder="your@email.com"
          >
        </div>

        <div class="contact-form__field">
          <label class="contact-form__label" for="category">CATEGORY</label>
          <select
            class="contact-form__input contact-form__select"
            id="category"
          >
            <option value="">Select a category</option>
            <option value="portraits">Portraits</option>
            <option value="events">Events</option>
            <option value="cinematic">Cinematic</option>
            <option value="studio">Studio</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="contact-form__field">
          <label class="contact-form__label" for="message">MESSAGE</label>
          <textarea
            class="contact-form__input contact-form__textarea"
            id="message"
            placeholder="Tell me about your project..."
          ></textarea>
        </div>

        <button class="contact-form__submit" id="submitBtn">SEND</button>
        <!-- Success / error message -->
        <p class="contact-form__feedback" id="formFeedback"></p>
        <div class="hidden-fields">
            <input type="date" name="date" aria-label="date">
            <input type="radio" name="rating" value="1" aria-label="1">
            <input type="radio" name="rating" value="2" aria-label="2">
            <input type="radio" name="rating" value="3" aria-label="3">
            <input type="radio" name="rating" value="4" aria-label="4">
            <input type="radio" name="rating" value="5" aria-label="5">
            <input type="checkbox" name="interest" value="1" aria-label="photo">
            <input type="checkbox" name="interest" value="2" aria-label="video">
            <input type="checkbox" name="interest" value="3" aria-label="design">
            <input type="checkbox" name="interest" value="4" aria-label="web">
        </div>
    </form>
</main>

    <!-- ============================================
       FOOTER
  ============================================ -->
    <footer class="footer">
      <p class="footer__text">&copy; 2026 ISO LIBRE. All rights reserved.</p>
      <nav class="footer__links">
        <a href="index.html" class="footer__link">Home</a>
        <a href="portfolio.html" class="footer__link">Portfolio</a>
        <a href="contact.html" class="footer__link">Contact</a>
        <a href="references.html" class="footer__link">References</a>
      </nav>
    </footer>

    <script src="scripts/portfolio.js" defer></script>
  </body>
</html>
